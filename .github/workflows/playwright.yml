name: Playwright Tests
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    env:
      # Hermetic install: Chromium lives under node_modules (via @playwright/browser-chromium).
      PLAYWRIGHT_BROWSERS_PATH: 0
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: lts/*
        cache: npm
    - name: Cache Playwright browsers
      uses: actions/cache@v4
      with:
        path: node_modules/playwright-core/.local-browsers
        key: playwright-browsers-${{ hashFiles('package-lock.json') }}
    - name: Install dependencies
      run: npm ci
    - name: Install Playwright OS dependencies
      run: npx playwright install-deps chromium
    - name: Run Playwright tests
      env:
        DIDAXIS_URL: ${{ secrets.DIDAXIS_URL }}
        DIDAXIS_EMAIL: ${{ secrets.DIDAXIS_EMAIL }}
        DIDAXIS_PASSWORD: ${{ secrets.DIDAXIS_PASSWORD }}
        DIDAXIS_API_TOKEN: ${{ secrets.DIDAXIS_API_TOKEN }}
      run: npx playwright test --project=setup --project=chromium-didaxis --project=chromium-guest
    - uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30
