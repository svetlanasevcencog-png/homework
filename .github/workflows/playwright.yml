name: Playwright Tests
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: lts/*
    - name: Install dependencies
      run: npm ci
    - name: Install Playwright Browsers
      run: npx playwright install chromium --with-deps
    - name: Run Playwright tests
      env:
        DIDAXIS_URL: ${{ secrets.DIDAXIS_URL }}
        DIDAXIS_EMAIL: ${{ secrets.DIDAXIS_EMAIL }}
        DIDAXIS_PASSWORD: ${{ secrets.DIDAXIS_PASSWORD }}
        DIDAXIS_API_TOKEN: ${{ secrets.DIDAXIS_API_TOKEN }}
      run: npx playwright test --project=setup --project=chromium-didaxis --project=chromium-guest
    - uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30
