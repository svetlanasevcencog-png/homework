name: E2E Tests
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      suite:
        description: Test suite to run on demand
        required: true
        default: regression
        type: choice
        options:
          - smoke
          - sanity
          - regression

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    # Secrets live in the "dev1" GitHub Environment.
    environment: dev1
    # Official Playwright image: browsers + OS deps are pre-installed.
    # Pin the tag to the @playwright/test version in package.json.
    container:
      image: mcr.microsoft.com/playwright:v1.59.1-noble
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: lts/*
        cache: npm
    - name: Install npm dependencies
      run: npm ci --ignore-scripts
    - name: Verify secrets are present (no values printed)
      env:
        DIDAXIS_EMAIL: ${{ secrets.DIDAXIS_EMAIL }}
        DIDAXIS_PASSWORD: ${{ secrets.DIDAXIS_PASSWORD }}
        DIDAXIS_API_TOKEN: ${{ secrets.DIDAXIS_API_TOKEN }}
        DIDAXIS_URL: ${{ secrets.DIDAXIS_URL }}
      run: |
        echo "DIDAXIS_EMAIL set:     ${DIDAXIS_EMAIL:+true}"
        echo "DIDAXIS_PASSWORD set:  ${DIDAXIS_PASSWORD:+true}"
        echo "DIDAXIS_API_TOKEN set: ${DIDAXIS_API_TOKEN:+true}"
        echo "DIDAXIS_URL set:       ${DIDAXIS_URL:+true}"
    - name: Resolve Playwright suite
      id: suite
      run: |
        case "${{ github.event_name }}" in
          pull_request)
            SUITE=smoke
            ;;
          push)
            SUITE=sanity
            ;;
          workflow_dispatch)
            SUITE="${{ inputs.suite }}"
            ;;
          *)
            echo "Unsupported event: ${{ github.event_name }}" >&2
            exit 1
            ;;
        esac
        echo "suite=${SUITE}" >> "$GITHUB_OUTPUT"
        echo "grep=@${SUITE}" >> "$GITHUB_OUTPUT"
        echo "Resolved suite: ${SUITE} (event=${{ github.event_name }})"
    # Auth setup has no suite tag; run it unfiltered, then the tagged suite
    # with --no-deps so --grep cannot skip authenticate-as-admin.
    - name: Run Playwright auth setup
      env:
        DIDAXIS_URL: ${{ secrets.DIDAXIS_URL }}
        DIDAXIS_EMAIL: ${{ secrets.DIDAXIS_EMAIL }}
        DIDAXIS_PASSWORD: ${{ secrets.DIDAXIS_PASSWORD }}
        DIDAXIS_API_TOKEN: ${{ secrets.DIDAXIS_API_TOKEN }}
      run: npx playwright test --project=setup
    - name: Run Playwright tests (${{ steps.suite.outputs.suite }})
      env:
        DIDAXIS_URL: ${{ secrets.DIDAXIS_URL }}
        DIDAXIS_EMAIL: ${{ secrets.DIDAXIS_EMAIL }}
        DIDAXIS_PASSWORD: ${{ secrets.DIDAXIS_PASSWORD }}
        DIDAXIS_API_TOKEN: ${{ secrets.DIDAXIS_API_TOKEN }}
      run: >
        npx playwright test
        --grep "${{ steps.suite.outputs.grep }}"
        --project=chromium-didaxis
        --project=chromium-guest
        --no-deps
    - uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: playwright-report-${{ steps.suite.outputs.suite }}
        path: playwright-report/
        retention-days: 30

  cypress:
    timeout-minutes: 30
    runs-on: ubuntu-latest
    # Secrets live in the "dev1" GitHub Environment.
    environment: dev1
    env:
      # Cypress provides its own browser; skip the Playwright browser download
      # that @playwright/browser-chromium would otherwise trigger on npm ci.
      PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: 1
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: lts/*
        cache: npm
    - name: Run Cypress tests
      uses: cypress-io/github-action@v6
      env:
        DIDAXIS_URL: ${{ secrets.DIDAXIS_URL }}
        DIDAXIS_EMAIL: ${{ secrets.DIDAXIS_EMAIL }}
        DIDAXIS_PASSWORD: ${{ secrets.DIDAXIS_PASSWORD }}
        DIDAXIS_API_TOKEN: ${{ secrets.DIDAXIS_API_TOKEN }}
    - uses: actions/upload-artifact@v4
      if: ${{ failure() }}
      with:
        name: cypress-screenshots
        path: cypress/screenshots/
        retention-days: 30
