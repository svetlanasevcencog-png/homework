name: E2E Tests
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    # Secrets live in the "dev1" GitHub Environment.
    environment: dev1
    # Official Playwright image: browsers + OS deps are pre-installed.
    # Pin the tag to the @playwright/test version in package.json.
    container:
      image: mcr.microsoft.com/playwright:v1.59.1-noble
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: lts/*
        cache: npm
    - name: Install npm dependencies
      run: npm ci --ignore-scripts
    - name: Verify secrets are present (no values printed)
      env:
        DIDAXIS_EMAIL: ${{ secrets.DIDAXIS_EMAIL }}
        DIDAXIS_PASSWORD: ${{ secrets.DIDAXIS_PASSWORD }}
        DIDAXIS_API_TOKEN: ${{ secrets.DIDAXIS_API_TOKEN }}
        DIDAXIS_URL: ${{ secrets.DIDAXIS_URL }}
      run: |
        echo "DIDAXIS_EMAIL set:     ${DIDAXIS_EMAIL:+true}"
        echo "DIDAXIS_PASSWORD set:  ${DIDAXIS_PASSWORD:+true}"
        echo "DIDAXIS_API_TOKEN set: ${DIDAXIS_API_TOKEN:+true}"
        echo "DIDAXIS_URL set:       ${DIDAXIS_URL:+true}"
    - name: Run Playwright tests
      env:
        DIDAXIS_URL: ${{ secrets.DIDAXIS_URL }}
        DIDAXIS_EMAIL: ${{ secrets.DIDAXIS_EMAIL }}
        DIDAXIS_PASSWORD: ${{ secrets.DIDAXIS_PASSWORD }}
        DIDAXIS_API_TOKEN: ${{ secrets.DIDAXIS_API_TOKEN }}
      run: npx playwright test --project=setup --project=chromium-didaxis --project=chromium-guest
    - uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30

  cypress:
    timeout-minutes: 30
    runs-on: ubuntu-latest
    # Secrets live in the "dev1" GitHub Environment.
    environment: dev1
    env:
      # Cypress provides its own browser; skip the Playwright browser download
      # that @playwright/browser-chromium would otherwise trigger on npm ci.
      PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: 1
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: lts/*
        cache: npm
    - name: Run Cypress tests
      uses: cypress-io/github-action@v6
      env:
        DIDAXIS_URL: ${{ secrets.DIDAXIS_URL }}
        DIDAXIS_EMAIL: ${{ secrets.DIDAXIS_EMAIL }}
        DIDAXIS_PASSWORD: ${{ secrets.DIDAXIS_PASSWORD }}
        DIDAXIS_API_TOKEN: ${{ secrets.DIDAXIS_API_TOKEN }}
    - uses: actions/upload-artifact@v4
      if: ${{ failure() }}
      with:
        name: cypress-screenshots
        path: cypress/screenshots/
        retention-days: 30
